name: 📊 全球股市日報 — 每日自動執行

on:
  schedule:
    # 每天 00:00 UTC = 台灣時間 08:00（UTC+8）
    - cron: '0 0 * * *'
  # 允許手動在 GitHub 頁面觸發
  workflow_dispatch:

jobs:
  daily-report:
    name: 蒐集新聞 → AI 分析 → 發送 Email
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 直接把 Secrets 注入為環境變數，config.py 用 os.getenv 讀取
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: "models/gemini-2.5-flash"
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
      EMAIL_SMTP_HOST: "smtp.gmail.com"
      EMAIL_SMTP_PORT: "587"
      MAX_NEWS_ITEMS: "40"
      DAILY_RUN_TIME: "08:00"

    steps:
      - name: ① 取得程式碼
        uses: actions/checkout@v4

      - name: ② 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: global_stock_monitor/requirements.txt

      - name: ③ 安裝套件
        working-directory: global_stock_monitor
        run: pip install -r requirements.txt

      - name: ④ 確認設定（不顯示敏感資訊）
        working-directory: global_stock_monitor
        run: |
          python -c "
          import os
          print('GEMINI_API_KEY:', 'OK' if os.getenv('GEMINI_API_KEY') else 'MISSING')
          print('EMAIL_SENDER:  ', os.getenv('EMAIL_SENDER', 'MISSING'))
          print('RECIPIENTS:    ', os.getenv('EMAIL_RECIPIENTS', 'MISSING'))
          "

      - name: ⑤ 執行分析並發送報告
        working-directory: global_stock_monitor
        run: python run_once.py

      - name: ⑥ 上傳今日報告（備份，保留 30 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-report-${{ github.run_id }}
          path: global_stock_monitor/reports/*.html
          retention-days: 30
          if-no-files-found: ignore
