name: 🤖 AlpacaBot — 每日交易 & 報告

on:
  schedule:
    # UTC 13:25 = 美東 09:25（開盤前 5 分鐘準備）
    # 使用 cron-job.org 或保留此排程作為備援
    - cron: '25 13 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily = 正常執行 | force = 強制再平衡'
        required: false
        default: 'daily'

permissions:
  contents: write   # 允許 commit 歷史報告回 repo

jobs:
  run-all-accounts:
    name: 遍歷帳戶 → 執行策略 → 生成報告 → 發送 Email
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ACCOUNTS_JSON:  ${{ secrets.ACCOUNTS_JSON }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}

    steps:
      # ── ① 取得程式碼 ──────────────────────────────────────
      - name: ① 取得程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── ② 設定 Python 環境 ─────────────────────────────────
      - name: ② 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: alpacabot/requirements.txt

      # ── ③ 安裝套件 ────────────────────────────────────────
      - name: ③ 安裝套件
        run: pip install -r alpacabot/requirements.txt

      # ── ④ 確認設定（不顯示敏感資訊）───────────────────────
      - name: ④ 確認設定
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: |
          python -c "
          import os, json
          raw = os.environ.get('ACCOUNTS_JSON', '')
          if not raw:
              print('❌ ACCOUNTS_JSON Secret 未設定！')
              exit(1)
          cfg = json.loads(raw)
          accs = cfg.get('accounts', [])
          print(f'✅ 帳戶數量: {len(accs)}')
          for a in accs:
              print(f'   - {a[\"name\"]} ({a[\"id\"]}) 策略: {a[\"active_strategy\"]}')
          print('EMAIL_SENDER:', 'OK' if os.environ.get('EMAIL_SENDER') else 'MISSING')
          "

      # ── ⑤ 執行策略引擎（遍歷所有帳戶）─────────────────────
      - name: ⑤ 執行策略 — 所有帳戶
        working-directory: alpacabot
        run: python -m core.strategy_engine --mode=${{ github.event.inputs.mode || 'daily' }}

      # ── ⑥ 生成日報 JSON ───────────────────────────────────
      - name: ⑥ 生成日報 JSON（Model 層）
        working-directory: alpacabot
        run: python -m report.report_model

      # ── ⑦ 發送 Email 通知 ────────────────────────────────
      - name: ⑦ 發送 Email（View 層）
        working-directory: alpacabot
        run: python -m notifications.email_sender

      # ── ⑧ Commit 報告回 repo（讓 Dashboard 可讀取）────────
      - name: ⑧ Commit 歷史報告
        run: |
          git config user.name  "AlpacaBot[bot]"
          git config user.email "alpacabot@users.noreply.github.com"
          git add alpacabot/reports/ || true
          git diff --staged --quiet || \
            git commit -m "chore: daily report $(date -u +%Y-%m-%d) [skip ci]"
          git push

      # ── ⑨ 備份報告為 Artifact ─────────────────────────────
      - name: ⑨ 備份報告（保留 90 天）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alpacabot-reports-${{ github.run_id }}
          path: alpacabot/reports/
          retention-days: 90
          if-no-files-found: ignore
