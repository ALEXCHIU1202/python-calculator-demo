name: Daily Trading & Report

on:
  schedule:
    - cron: '30 13 * * 1-5'   # UTC 13:30 = 美東 09:30 開盤
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily=正常 / force=強制再平衡'
        required: false
        default: 'daily'

permissions:
  contents: write   # 允許 commit 報告回 repo

jobs:
  run-all-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r alpacabot/requirements.txt

      - name: Write accounts config from Secret
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: |
          mkdir -p alpacabot/accounts
          echo "$ACCOUNTS_JSON" > alpacabot/accounts/accounts.json

      - name: Run strategy engine (all accounts)
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        working-directory: alpacabot
        run: python -m core.strategy_engine --mode=${{ github.event.inputs.mode || 'daily' }}

      - name: Generate daily reports
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        working-directory: alpacabot
        run: python -m report.report_model

      - name: Send email notifications
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
        working-directory: alpacabot
        run: python -m notifications.email_sender

      # ── 報告 commit 回 repo，讓 Dashboard 可讀取 ──────────
      - name: Commit reports to repo
        run: |
          git config user.name  "AlpacaBot[bot]"
          git config user.email "alpacabot@users.noreply.github.com"
          git add alpacabot/reports/ || true
          git diff --staged --quiet || \
            git commit -m "chore: daily report $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload reports as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-reports-${{ github.run_id }}
          path: alpacabot/reports/
          retention-days: 90
